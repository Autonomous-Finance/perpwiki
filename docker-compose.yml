services:
  app:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-4001}
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/data/production.sqlite3
      - DATABASE_PATH=${DATABASE_PATH:-/data/production.sqlite3}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://perp.wiki}
      - LITESTREAM_S3_BUCKET=${LITESTREAM_S3_BUCKET}
      - LITESTREAM_S3_PATH=${LITESTREAM_S3_PATH}
      - LITESTREAM_S3_ENDPOINT=${LITESTREAM_S3_ENDPOINT}
      - LITESTREAM_S3_REGION=${LITESTREAM_S3_REGION}
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY}
    ports:
      - "${PORT:-4001}:${PORT:-4001}"
    volumes:
      - sqlite_data:/data
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT:-4001}/api/health').then(r=>{if(!r.ok)throw new Error();process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perpwiki.rule=Host(`perp.wiki`) || Host(`www.perp.wiki`)"
      - "traefik.http.routers.perpwiki.entrypoints=websecure"
      - "traefik.http.routers.perpwiki.tls=true"
      - "traefik.http.routers.perpwiki.tls.certresolver=letsencrypt"
      - "traefik.http.services.perpwiki.loadbalancer.server.port=${PORT:-4001}"
      - "traefik.http.routers.perpwiki-http.rule=Host(`perp.wiki`) || Host(`www.perp.wiki`)"
      - "traefik.http.routers.perpwiki-http.entrypoints=web"
      - "traefik.http.routers.perpwiki-http.middlewares=redirect-to-https@file"

  litestream:
    image: litestream/litestream:latest
    command: replicate -config /etc/litestream.yml
    environment:
      - LITESTREAM_S3_BUCKET=${LITESTREAM_S3_BUCKET}
      - LITESTREAM_S3_PATH=${LITESTREAM_S3_PATH}
      - LITESTREAM_S3_ENDPOINT=${LITESTREAM_S3_ENDPOINT}
      - LITESTREAM_S3_REGION=${LITESTREAM_S3_REGION}
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY}
    volumes:
      - sqlite_data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

volumes:
  sqlite_data:

networks:
  dokploy-network:
    external: true
